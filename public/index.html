<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChefAI — Your Personal Chef</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS Variables ── */
    :root {
      --bg:             #0d0c0b;
      --surface:        #161513;
      --card:           #1e1c19;
      --card-hover:     #242220;
      --border:         #2c2a26;
      --border-light:   #3a3834;
      --accent:         #e8a020;
      --accent-dim:     rgba(232,160,32,0.15);
      --accent-hover:   #d4911a;
      --text-primary:   #f0ebe2;
      --text-secondary: #8c8680;
      --text-muted:     #56534f;
      --protein:        #52b788;
      --carbs:          #e8a020;
      --fat:            #e05b32;
      --radius:         14px;
      --radius-sm:      8px;
      --shadow:         0 4px 24px rgba(0,0,0,0.4);
      --shadow-sm:      0 2px 10px rgba(0,0,0,0.3);
      --transition:     0.2s ease;
    }

    [data-theme="light"] {
      --bg:             #f7f4ef;
      --surface:        #ffffff;
      --card:           #ffffff;
      --card-hover:     #f9f7f4;
      --border:         #e8e4de;
      --border-light:   #d8d4ce;
      --text-primary:   #1a1814;
      --text-secondary: #6b6560;
      --text-muted:     #a09890;
      --shadow:         0 4px 24px rgba(0,0,0,0.08);
      --shadow-sm:      0 2px 10px rgba(0,0,0,0.06);
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
      overflow-x: hidden;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    input, select, textarea { font-family: inherit; }
    a { text-decoration: none; color: inherit; }

    /* ── Serif util ── */
    .serif { font-family: 'Playfair Display', Georgia, serif; }

    /* ── Header ── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 64px;
      background: rgba(13,12,11,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }
    [data-theme="light"] .header {
      background: rgba(247,244,239,0.9);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo .logo-icon {
      font-size: 24px;
      line-height: 1;
    }
    .header-logo .logo-name {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }
    .header-logo .logo-name span {
      color: var(--accent);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .theme-toggle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition), transform var(--transition);
    }
    .theme-toggle:hover {
      background: var(--card-hover);
      transform: rotate(20deg);
    }

    /* ── Main layout ── */
    main {
      padding-top: 64px;
    }

    /* ── Section wrapper ── */
    .section {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      padding: 80px 20px 140px;
    }

    /* Animated gradient background */
    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: linear-gradient(135deg, #0d0c0b 0%, #1a1208 25%, #0f1a0a 50%, #1a0e08 75%, #0d0c0b 100%);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
    }
    [data-theme="light"] .hero-bg {
      background: linear-gradient(135deg, #f7f4ef 0%, #fdf3e0 25%, #f0f7ec 50%, #fdf0e8 75%, #f7f4ef 100%);
      background-size: 400% 400%;
    }
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Subtle radial glow behind headline */
    .hero-glow {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(232,160,32,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 720px;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-dim);
      border: 1px solid rgba(232,160,32,0.3);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 28px;
    }

    .hero-headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 900;
      line-height: 1.12;
      color: var(--text-primary);
      margin-bottom: 20px;
      letter-spacing: -1px;
    }
    .hero-headline em {
      font-style: italic;
      color: var(--accent);
    }

    .hero-sub {
      font-size: 17px;
      font-weight: 400;
      color: var(--text-secondary);
      max-width: 500px;
      margin: 0 auto 48px;
      line-height: 1.7;
    }

    /* Scroll indicator */
    .hero-scroll {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      animation: bounce 2s ease-in-out infinite;
    }
    .hero-scroll .arrow { font-size: 18px; }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(6px); }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-logo">
      <span class="logo-icon">🍽️</span>
      <span class="logo-name">Chef<span>AI</span></span>
    </div>
    <div class="header-actions">
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme" onclick="toggleTheme()">🌙</button>
    </div>
  </header>

  <main id="app">

    <!-- ── Hero ── -->
    <section class="hero">
      <div class="hero-bg"></div>
      <div class="hero-glow"></div>
      <div class="hero-content">
        <div class="hero-eyebrow">
          <span>✨</span> AI-Powered Personal Chef
        </div>
        <h1 class="hero-headline">
          Tell me what's in<br/>your kitchen.<br/><em>I'll make you a meal.</em>
        </h1>
        <p class="hero-sub">
          Add your ingredients, equipment, and dietary goal — ChefAI builds a personalized recipe with full macros in seconds.
        </p>
      </div>
      <div class="hero-scroll">
        <span>Start cooking</span>
        <span class="arrow">↓</span>
      </div>
    </section>

    <!-- Input + Recipe sections added in later steps -->

  </main>

  <script>
    // ── Theme ──
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.dataset.theme === 'dark';
      html.dataset.theme = isDark ? 'light' : 'dark';
      document.getElementById('theme-toggle').textContent = isDark ? '🌙' : '☀️';
      localStorage.setItem('theme', html.dataset.theme);
    }

    // Restore saved theme
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.dataset.theme = savedTheme;
    document.getElementById('theme-toggle').textContent = savedTheme === 'dark' ? '☀️' : '🌙';
  </script>
</body>
</html>
