<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #1a1a1a;
      color: #fff;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header span { font-size: 28px; }
    header h1 { font-size: 22px; font-weight: 600; }

    main {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      margin-bottom: 8px;
    }

    .ingredient-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .ingredient-label-row label { margin-bottom: 0; }

    .scan-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f5f5f0;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: #444;
      transition: background 0.2s, border-color 0.2s;
    }
    .scan-btn:hover { background: #eee; border-color: #ccc; }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .scan-btn .scan-spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid #ccc;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .tag-input-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: text;
      min-height: 52px;
      align-items: center;
      transition: border-color 0.2s;
    }
    .tag-input-wrap:focus-within { border-color: #1a1a1a; }

    .tag {
      background: #1a1a1a;
      color: #fff;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tag button {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0;
    }
    .tag button:hover { color: #fff; }

    #ingredient-input {
      border: none;
      outline: none;
      font-size: 15px;
      flex: 1;
      min-width: 120px;
      background: transparent;
    }

    .hint { font-size: 12px; color: #aaa; margin-top: 6px; }

    /* image preview */
    #scan-preview-wrap {
      display: none;
      margin-top: 14px;
      position: relative;
      width: fit-content;
    }
    #scan-preview {
      max-width: 100%;
      max-height: 180px;
      border-radius: 10px;
      border: 1.5px solid #e0e0e0;
      display: block;
    }
    #clear-image {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-top: 20px; }

    select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      background: #fff;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    select:focus { border-color: #1a1a1a; }

    button#generate {
      margin-top: 24px;
      width: 100%;
      padding: 14px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button#generate:hover { background: #333; }
    button#generate:active { transform: scale(0.99); }
    button#generate:disabled { background: #aaa; cursor: not-allowed; }

    #result { display: none; }

    .recipe-title { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
    .recipe-desc { font-size: 15px; color: #555; margin-bottom: 20px; line-height: 1.6; }

    .meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
    .meta-item { background: #f5f5f0; border-radius: 8px; padding: 8px 14px; font-size: 13px; color: #444; }
    .meta-item strong { display: block; font-size: 11px; text-transform: uppercase; color: #999; margin-bottom: 2px; }

    h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; color: #999; margin-bottom: 12px; }

    .ingredients-list { list-style: none; margin-bottom: 24px; }
    .ingredients-list li {
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 15px;
      display: flex;
      gap: 8px;
    }
    .ingredients-list li span:first-child { color: #888; min-width: 70px; font-size: 13px; }

    .steps-list { list-style: none; margin-bottom: 24px; }
    .steps-list li { display: flex; gap: 14px; margin-bottom: 14px; font-size: 15px; line-height: 1.6; }
    .step-num {
      background: #1a1a1a;
      color: #fff;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .tip {
      background: #fffbeb;
      border-left: 3px solid #f59e0b;
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
      font-size: 14px;
      color: #555;
    }
    .tip strong { color: #b45309; }

    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid #fff4;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
      margin-top: 16px;
    }
  </style>
</head>
<body>

<header>
  <span>🍽️</span>
  <h1>Recipe Generator</h1>
</header>

<main>
  <div class="card">
    <div class="ingredient-label-row">
      <label for="ingredient-input">Ingredients</label>
      <button class="scan-btn" id="scan-btn" onclick="triggerScan()">
        <span>📷</span>
        <span id="scan-btn-text">Scan photo</span>
        <div class="scan-spinner" id="scan-spinner"></div>
      </button>
    </div>

    <!-- hidden file input — accepts camera on mobile, file on desktop -->
    <input type="file" id="image-input" accept="image/*" capture="environment" style="display:none" onchange="handleImageSelected(event)" />

    <div class="tag-input-wrap" id="tag-wrap">
      <input id="ingredient-input" type="text" placeholder="Type an ingredient and press Enter…" />
    </div>
    <p class="hint">Press Enter or comma to add. Or scan a photo of your ingredients.</p>

    <div id="scan-preview-wrap">
      <img id="scan-preview" alt="Scanned ingredients" />
      <button id="clear-image" onclick="clearImage()" title="Remove image">×</button>
    </div>

    <div class="row">
      <div>
        <label for="cuisine">Cuisine</label>
        <select id="cuisine">
          <option value="any">Any</option>
          <option value="italian">Italian</option>
          <option value="mexican">Mexican</option>
          <option value="asian">Asian</option>
          <option value="mediterranean">Mediterranean</option>
          <option value="american">American</option>
          <option value="indian">Indian</option>
          <option value="french">French</option>
        </select>
      </div>
      <div>
        <label for="difficulty">Difficulty</label>
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>
      <div>
        <label for="diet">Diet</label>
        <select id="diet">
          <option value="none">None</option>
          <option value="vegetarian">Vegetarian</option>
          <option value="vegan">Vegan</option>
          <option value="gluten-free">Gluten-free</option>
          <option value="dairy-free">Dairy-free</option>
          <option value="keto">Keto</option>
        </select>
      </div>
    </div>

    <button id="generate" onclick="generateRecipe()">
      <span id="btn-text">Generate Recipe</span>
      <div class="spinner" id="spinner"></div>
    </button>
    <div class="error-box" id="error-box"></div>
  </div>

  <div class="card" id="result">
    <div class="recipe-title" id="r-title"></div>
    <div class="recipe-desc" id="r-desc"></div>

    <div class="meta">
      <div class="meta-item"><strong>Prep</strong><span id="r-prep"></span></div>
      <div class="meta-item"><strong>Cook</strong><span id="r-cook"></span></div>
      <div class="meta-item"><strong>Servings</strong><span id="r-servings"></span></div>
    </div>

    <h3>Ingredients</h3>
    <ul class="ingredients-list" id="r-ingredients"></ul>

    <h3>Steps</h3>
    <ol class="steps-list" id="r-steps"></ol>

    <div class="tip" id="r-tip" style="display:none">
      <strong>Chef's Tip: </strong><span id="r-tip-text"></span>
    </div>
  </div>
</main>

<script>
  const tags = [];
  const input = document.getElementById('ingredient-input');
  const wrap = document.getElementById('tag-wrap');

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      addTag(input.value.trim().replace(/,$/, ''));
    } else if (e.key === 'Backspace' && input.value === '' && tags.length) {
      removeTag(tags.length - 1);
    }
  });

  wrap.addEventListener('click', () => input.focus());

  function addTag(val) {
    if (!val || tags.includes(val)) return;
    tags.push(val);
    renderTags();
    input.value = '';
  }

  function removeTag(i) {
    tags.splice(i, 1);
    renderTags();
  }

  function renderTags() {
    wrap.querySelectorAll('.tag').forEach(t => t.remove());
    tags.forEach((t, i) => {
      const tag = document.createElement('div');
      tag.className = 'tag';
      tag.innerHTML = `${t} <button onclick="removeTag(${i})">×</button>`;
      wrap.insertBefore(tag, input);
    });
  }

  // ---------- scan ----------

  function triggerScan() {
    document.getElementById('image-input').click();
  }

  function handleImageSelected(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async (ev) => {
      const dataUrl = ev.target.result;

      // show preview
      const preview = document.getElementById('scan-preview');
      preview.src = dataUrl;
      document.getElementById('scan-preview-wrap').style.display = 'block';

      // call scan API
      setScanLoading(true);
      hideError();
      try {
        const res = await fetch('/api/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: dataUrl }),
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Scan failed.');
        }
        const { ingredients } = await res.json();
        ingredients.forEach(addTag);
      } catch (err) {
        showError(err.message);
      } finally {
        setScanLoading(false);
        // reset so same file can be re-selected
        e.target.value = '';
      }
    };
    reader.readAsDataURL(file);
  }

  function clearImage() {
    document.getElementById('scan-preview-wrap').style.display = 'none';
    document.getElementById('scan-preview').src = '';
  }

  function setScanLoading(on) {
    const btn = document.getElementById('scan-btn');
    btn.disabled = on;
    document.getElementById('scan-btn-text').textContent = on ? 'Scanning…' : 'Scan photo';
    document.getElementById('scan-spinner').style.display = on ? 'block' : 'none';
  }

  // ---------- generate ----------

  async function generateRecipe() {
    if (tags.length === 0) {
      showError('Add at least one ingredient.');
      return;
    }

    setLoading(true);
    hideError();

    const body = {
      ingredients: tags,
      cuisine: document.getElementById('cuisine').value,
      difficulty: document.getElementById('difficulty').value,
      diet: document.getElementById('diet').value,
    };

    try {
      const res = await fetch('/api/recipe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Something went wrong.');
      }
      const recipe = await res.json();
      renderRecipe(recipe);
    } catch (err) {
      showError(err.message);
    } finally {
      setLoading(false);
    }
  }

  function renderRecipe(r) {
    document.getElementById('r-title').textContent = r.title;
    document.getElementById('r-desc').textContent = r.description;
    document.getElementById('r-prep').textContent = r.prep_time;
    document.getElementById('r-cook').textContent = r.cook_time;
    document.getElementById('r-servings').textContent = r.servings;

    document.getElementById('r-ingredients').innerHTML = r.ingredients.map(i =>
      `<li><span>${i.amount}</span><span>${i.name}</span></li>`
    ).join('');

    document.getElementById('r-steps').innerHTML = r.steps.map((s, i) =>
      `<li><div class="step-num">${i + 1}</div><span>${s}</span></li>`
    ).join('');

    const tipEl = document.getElementById('r-tip');
    if (r.tip) {
      document.getElementById('r-tip-text').textContent = r.tip;
      tipEl.style.display = 'block';
    } else {
      tipEl.style.display = 'none';
    }

    const result = document.getElementById('result');
    result.style.display = 'block';
    result.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function setLoading(on) {
    document.getElementById('generate').disabled = on;
    document.getElementById('btn-text').style.display = on ? 'none' : 'inline';
    document.getElementById('spinner').style.display = on ? 'block' : 'none';
  }

  function showError(msg) {
    const el = document.getElementById('error-box');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('error-box').style.display = 'none';
  }
</script>
</body>
</html>
